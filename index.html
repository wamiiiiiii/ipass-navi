<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- 文字エンコーディング：UTF-8で日本語を正しく表示する -->
  <meta charset="UTF-8">

  <!--
    Content-Security-Policy（最低限のXSS対策）
    - スクリプトは同一オリジンのみ（外部スクリプト読込・eval禁止）
    - スタイルは同一オリジン+Google Fonts。'unsafe-inline'は既存コードの style 属性のため一時的に許可
    - 画像はself+data URI（emoji icon等）
    - フォントはGoogle Fonts CDNを許可
    - frame-ancestors 'none' でクリックジャッキング防止
    - base-uri 'self' でbase書き換え攻撃防止
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">

  <!-- ビューポート設定：スマホでの適切な表示サイズを指定する -->
  <!-- viewport-fit=cover でiPhoneのノッチ・ホームバー領域まで使用する -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA向けメタタグ -->
  <!-- ホーム画面追加時にネイティブアプリ風に表示する -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="iPassナビ">

  <!-- テーマカラー：ブラウザのUIカラーをブランドカラーに合わせる -->
  <meta name="theme-color" content="#2d3561">

  <!-- SEO・共有向けメタタグ -->
  <meta name="description" content="ITパスポート試験（IPA）の出題範囲に基づいた学習アプリ。教科書・問題演習・用語辞書をオフラインで使用できます。">

  <!-- ファビコン -->
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- PWAマニフェストの読み込み -->
  <link rel="manifest" href="./manifest.json">

  <!-- Google Fonts：Figma Makeデザインで使用するセリフ・サンセリフフォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">

  <!-- アプリタイトル（ブラウザのタブに表示される） -->
  <title>iPass ナビ - ITパスポート学習アプリ</title>

  <!-- ===== CSS読み込み ===== -->
  <!-- 1. リセットCSS（ブラウザ差異の吸収）-->
  <link rel="stylesheet" href="./css/reset.css">

  <!-- 2. CSS変数定義（カラーテーマ・フォントサイズ）-->
  <link rel="stylesheet" href="./css/variables.css">

  <!-- 3. 共通レイアウト（ヘッダー・ボトムナビ・カード）-->
  <link rel="stylesheet" href="./css/layout.css">

  <!-- 4. 各画面のスタイル -->
  <link rel="stylesheet" href="./css/home.css">
  <link rel="stylesheet" href="./css/textbook.css">
  <link rel="stylesheet" href="./css/quiz.css">
  <link rel="stylesheet" href="./css/glossary.css">
  <link rel="stylesheet" href="./css/settings.css">

  <!-- 5. 図解コンポーネントのスタイル -->
  <link rel="stylesheet" href="./css/diagram.css">

  <!-- 6. 正解演出（紙吹雪・バウンス） -->
  <link rel="stylesheet" href="./css/celebration.css">
</head>

<body>
  <!--
    アプリ全体のラッパー
    max-width: 430px で中央に配置される（デスクトップでスマホ幅で表示）
  -->
  <div id="app-wrapper">

    <!-- ===== ヘッダー（固定・画面上部） ===== -->
    <header id="app-header" role="banner">
      <!--
        戻るボタン（サブ画面でのみ表示される）
        app.jsから show/hide を制御する
      -->
      <button
        id="header-back-btn"
        class="header-back-btn"
        aria-label="前の画面に戻る"
        style="display: none;"
      >
        ← 戻る
      </button>

      <!-- 画面タイトル（router.jsが書き換える） -->
      <h1 id="header-title" class="header-title">iPass ナビ</h1>

      <!--
        右側スペーサー（戻るボタンとのバランスを取るため）
        将来的にブックマークボタンなどを配置する場所
      -->
      <div style="min-width: 44px;"></div>
    </header>

    <!-- ===== メインコンテンツ（スクロール可能） ===== -->
    <!--
      各画面のコンテンツはJavaScriptによってここに描画される
      padding-top: ヘッダー高さ分
      padding-bottom: ボトムナビ高さ分
    -->
    <main id="main-content" aria-live="polite">
      <!--
        初期表示：ロード中メッセージ
        app.jsが起動すると自動的にホーム画面に切り替わる
      -->
      <div class="loading-spinner" style="padding-top: 80px;">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- ===== ボトムナビゲーション（固定・画面下部） ===== -->
    <!--
      5タブ構成：ホーム・教科書・演習・辞書・設定
      親指1本で操作できる固定配置
    -->
    <nav id="bottom-nav" role="tablist" aria-label="メインナビゲーション">

      <!-- ホームタブ -->
      <button
        id="nav-home"
        class="nav-tab is-active"
        role="tab"
        aria-selected="true"
        aria-label="ホーム"
      >
        <!-- ハウスSVGアイコン（外部ライブラリなし） -->
        <span class="nav-tab-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9.5L12 3L21 9.5V20C21 20.5523 20.5523 21 20 21H15V15H9V21H4C3.44772 21 3 20.5523 3 20V9.5Z"
              stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="nav-tab-label">ホーム</span>
      </button>

      <!-- 教科書タブ -->
      <button
        id="nav-textbook"
        class="nav-tab"
        role="tab"
        aria-selected="false"
        aria-label="教科書"
      >
        <span class="nav-tab-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4H15C15.5523 4 16 4.44772 16 5V19C16 19.5523 15.5523 20 15 20H4C3.44772 20 3 19.5523 3 19V5C3 4.44772 3.44772 4 4 4Z"
              stroke="currentColor" stroke-width="2"/>
            <path d="M16 7H19C19.5523 7 20 7.44772 20 8V19C20 19.5523 19.5523 20 19 20H16"
              stroke="currentColor" stroke-width="2"/>
            <line x1="7" y1="9" x2="13" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="12" x2="13" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="15" x2="11" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-tab-label">教科書</span>
      </button>

      <!-- 演習タブ -->
      <button
        id="nav-quiz"
        class="nav-tab"
        role="tab"
        aria-selected="false"
        aria-label="問題演習"
      >
        <span class="nav-tab-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 20H5C4.44772 20 4 19.5523 4 19V5C4 4.44772 4.44772 4 5 4H19C19.5523 4 20 4.44772 20 5V12"
              stroke="currentColor" stroke-width="2"/>
            <path d="M8 9H16M8 13H13M15 18L17 20L21 16"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="nav-tab-label">演習</span>
      </button>

      <!-- 辞書タブ -->
      <button
        id="nav-glossary"
        class="nav-tab"
        role="tab"
        aria-selected="false"
        aria-label="用語辞書"
      >
        <span class="nav-tab-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="8.5" y1="11" x2="13.5" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="8.5" x2="11" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-tab-label">辞書</span>
      </button>

      <!-- 設定タブ -->
      <button
        id="nav-settings"
        class="nav-tab"
        role="tab"
        aria-selected="false"
        aria-label="設定"
      >
        <span class="nav-tab-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2C11.4477 2 11 2.44772 11 3V4.06189C9.82944 4.2778 8.7306 4.72978 7.77515 5.36371L7.02944 4.61799C6.63892 4.22747 6.00576 4.22747 5.61523 4.61799L4.61799 5.61523C4.22747 6.00576 4.22747 6.63892 4.61799 7.02944L5.36371 7.77515C4.72978 8.7306 4.2778 9.82944 4.06189 11H3C2.44772 11 2 11.4477 2 12C2 12.5523 2.44772 13 3 13H4.06189C4.2778 14.1706 4.72978 15.2694 5.36371 16.2249L4.61799 16.9706C4.22747 17.3611 4.22747 17.9943 4.61799 18.3848L5.61523 19.382C6.00576 19.7725 6.63892 19.7725 7.02944 19.382L7.77515 18.6363C8.7306 19.2702 9.82944 19.7222 11 19.9381V21C11 21.5523 11.4477 22 12 22C12.5523 22 13 21.5523 13 21V19.9381C14.1706 19.7222 15.2694 19.2702 16.2249 18.6363L16.9706 19.382C17.3611 19.7725 17.9943 19.7725 18.3848 19.382L19.382 18.3848C19.7725 17.9943 19.7725 17.3611 19.382 16.9706L18.6363 16.2249C19.2702 15.2694 19.7222 14.1706 19.9381 13H21C21.5523 13 22 12.5523 22 12C22 11.4477 21.5523 11 21 11H19.9381C19.7222 9.82944 19.2702 8.7306 18.6363 7.77515L19.382 7.02944C19.7725 6.63892 19.7725 6.00576 19.382 5.61523L18.3848 4.61799C17.9943 4.22747 17.3611 4.22747 16.9706 4.61799L16.2249 5.36371C15.2694 4.72978 14.1706 4.2778 13 4.06189V3C13 2.44772 12.5523 2 12 2Z"
              stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
        <span class="nav-tab-label">設定</span>
      </button>

    </nav><!-- /#bottom-nav -->

  </div><!-- /#app-wrapper -->

  <!--
    JavaScriptの読み込み
    type="module" でES Modulesとして読み込む（import/export が使用可能になる）
    defer 属性でDOMの解析完了後に実行される
  -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
